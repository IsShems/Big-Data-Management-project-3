services:

  # ── Kafka broker (KRaft, no ZooKeeper) ──────────────────────────────────────
  kafka:
    image: apache/kafka:3.9.2
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qg
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ── PostgreSQL — OLTP source for CDC ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: sourcedb
      POSTGRES_USER: ${PG_USER:-cdc_user}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-cdc_pass}
    command:
      - "postgres"
      - "-c" 
      - "wal_level=logical"
      - "-c"
      - "max_replication_slots=4"
      - "-c"
      - "max_wal_senders=4"
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-cdc_user} -d sourcedb"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Kafka Connect + Debezium PostgreSQL connector ────────────────────────────
  connect:
    image: quay.io/debezium/connect:3.0
    container_name: connect
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      GROUP_ID: 1
      BOOTSTRAP_SERVERS: kafka:9092
      CONFIG_STORAGE_TOPIC: _connect_configs
      OFFSET_STORAGE_TOPIC: _connect_offsets
      STATUS_STORAGE_TOPIC: _connect_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  # ── MinIO — S3-compatible object storage for Iceberg ─────────────────────────
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── One-shot: create the 'warehouse' bucket ──────────────────────────────────
  mc:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: minio_init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
        mc alias set s3 http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
        mc mb s3/warehouse --ignore-existing &&
        echo 'Bucket warehouse is ready'
      "

  # ── Iceberg REST catalog ─────────────────────────────────────────────────────
  iceberg-rest:
    image: tabulario/iceberg-rest:1.6.0
    container_name: iceberg-rest
    depends_on:
      mc:
        condition: service_completed_successfully
    ports:
      - "8181:8181"
    environment:
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - AWS_REGION=us-east-1
      - CATALOG_WAREHOUSE=s3://warehouse/
      - CATALOG_IO__IMPL=org.apache.iceberg.aws.s3.S3FileIO
      - CATALOG_S3_ENDPOINT=http://minio:9000
      - CATALOG_S3_PATH__STYLE__ACCESS=true

  # ── Airflow (webserver + scheduler in one container for simplicity) ──────────
  # Session 6: DAG tasks run spark-submit inside Jupyter via docker exec (needs Docker socket).
  airflow:
    image: apache/airflow:2.10.5-python3.11
    container_name: airflow
    user: root
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      connect:
        condition: service_healthy
      jupyter:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - AIRFLOW__WEBSERVER__EXPOSE_CONFIG=True
      # REST API: allow notebook/scripts to use HTTP Basic Auth (same FAB user as the UI)
      - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
      # HttpSensor task health_check uses conn_id debezium_connect
      - 'AIRFLOW_CONN_DEBEZIUM_CONNECT={"conn_type":"http","host":"connect","port":8083,"schema":"http"}'
      # Used inside the entrypoint (must be real env vars in the container, not only compose substitution)
      - AIRFLOW_USER=${AIRFLOW_USER:-admin}
      - AIRFLOW_PASSWORD=${AIRFLOW_PASSWORD:-admin}
      - KAFKA_BOOTSTRAP=kafka:9092
      - CONNECT_URL=http://connect:8083
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_DB=sourcedb
      - PG_USER=${PG_USER:-cdc_user}
      - PG_PASSWORD=${PG_PASSWORD:-cdc_pass}
      - CDC_CONNECTOR_NAME=${CDC_CONNECTOR_NAME:-pg-cdc-connector}
      - CDC_KAFKA_TOPIC=${CDC_KAFKA_TOPIC:-dbserver1.public.customers}
      - JUPYTER_CONTAINER_NAME=${JUPYTER_CONTAINER_NAME:-jupyter}
    volumes:
      - ./dags:/opt/airflow/dags
      - airflow-data:/opt/airflow
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint:
      - /bin/bash
      - -c
      - |
        set -e
        if ! command -v docker >/dev/null 2>&1; then
          apt-get update -qq && apt-get install -y -qq docker.io >/dev/null
        fi
        # Docker CLI in DAG tasks runs as user `airflow`; socket must be usable (dev only).
        chmod 666 /var/run/docker.sock 2>/dev/null || true
        AF_USER="$${AIRFLOW_USER:-admin}"
        AF_PASS="$${AIRFLOW_PASSWORD:-admin}"
        AIRFLOW_BIN=/home/airflow/.local/bin/airflow
        # Standalone web UI does not reliably bind :8080 when the main process is root — run Airflow as `airflow`.
        runuser -u airflow -- "$${AIRFLOW_BIN}" db migrate
        set +e
        runuser -u airflow -- "$${AIRFLOW_BIN}" users create \
          --username "$${AF_USER}" \
          --password "$${AF_PASS}" \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com
        EC=$$?
        set -e
        if [ "$$EC" -ne 0 ]; then
          runuser -u airflow -- "$${AIRFLOW_BIN}" users reset-password \
            --username "$${AF_USER}" --password "$${AF_PASS}"
        fi
        # Keep webserver in foreground so container health tracks API availability.
        exec runuser -u airflow -- /bin/bash -lc "set -e; /home/airflow/.local/bin/airflow scheduler --daemon; exec /home/airflow/.local/bin/airflow webserver --port 8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 10s
      start_period: 90s
      retries: 10

  # ── Jupyter + PySpark ────────────────────────────────────────────────────────
  jupyter:
    image: quay.io/jupyter/pyspark-notebook:spark-3.5.0
    container_name: jupyter
    # Root for one-shot chmod/chown on the bind mount; Airflow writes dags/*.json as another
    # UID — without this, jovyan often gets PermissionError on Windows/macOS bind mounts.
    user: root
    depends_on:
      - kafka
      - postgres
      - iceberg-rest
    ports:
      - "8888:8888"
      - "4040:4040"
    volumes:
      - ./:/home/jovyan/project
    environment:
      - JUPYTER_TOKEN=${JUPYTER_TOKEN}
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - AWS_REGION=us-east-1
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_DB=sourcedb
      - PG_USER=${PG_USER:-cdc_user}
      - PG_PASSWORD=${PG_PASSWORD:-cdc_pass}
      - KAFKA_BOOTSTRAP=kafka:9092
      - CONNECT_URL=http://connect:8083
      # For week_06_practice.ipynb Airflow REST API calls (must match Airflow FAB user)
      - AIRFLOW_USER=${AIRFLOW_USER:-admin}
      - AIRFLOW_PASSWORD=${AIRFLOW_PASSWORD:-admin}
      - CDC_CONNECTOR_NAME=${CDC_CONNECTOR_NAME:-pg-cdc-connector}
      - TAXI_DATA_PATH=/home/jovyan/project/data
      - ICEBERG_REST_URI=http://iceberg-rest:8181
      - S3_ENDPOINT=http://minio:9000
      # Spark 3.5.0 in this image is built for Scala 2.12 (default bin-hadoop3). Use _2.12 artifacts;
      # _2.13 Kafka/Iceberg jars cause NoClassDefFoundError: scala/$less$colon$less at runtime.
      - PYSPARK_SUBMIT_ARGS=--packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0,org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.10.0,org.apache.iceberg:iceberg-aws-bundle:1.10.0 pyspark-shell
    # Image ENTRYPOINT is `tini … start.sh`. start.sh already drops root → jovyan via sudo.
    # Do NOT nest `runuser` inside that (it runs as jovyan and exits before the server starts).
    entrypoint:
      - /bin/bash
      - -c
      - |
          mkdir -p /home/jovyan/project/dags
          chmod -R 777 /home/jovyan/project 2>/dev/null || true
          chown -R jovyan:users /home/jovyan/project 2>/dev/null || true
          exec /usr/local/bin/start.sh start-notebook.py \
            --ServerApp.token=${JUPYTER_TOKEN} \
            --ServerApp.password='' \
            --ServerApp.allow_origin='*' \
            --ServerApp.allow_remote_access=True

volumes:
  pg-data:
  minio-data:
  airflow-data:
